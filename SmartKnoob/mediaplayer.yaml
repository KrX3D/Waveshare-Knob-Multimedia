# Generated by esphome-code-assistant v1.0.0
# mediaplayer.yaml — fixed: volume reset, duplicate sensor, text sanitization

substitutions:
  play_icon:         "\U0000e90a"
  pause_icon:        "\U0000e90b"
  back_step_icon:    "\U0000e90c"
  forward_step_icon: "\U0000e90d"
  repeat_off_icon:   "\U0000e913"

http_request:
  verify_ssl: false
  timeout: 10s
  watchdog_timeout: 15s

font:
  - file: "WaveShare_ESP32_S3/fonts/Nunito-SemiBold.ttf"
    id: nunito_16
    size: 16
    bpp: 4
    glyphsets:
      - GF_Latin_Core
      - GF_Cyrillic_Core
      - GF_Latin_Vietnamese
    glyphs: "²"
    extras:
      - file: "WaveShare_ESP32_S3/fonts/Jua-Regular.ttf"
        glyphs: ["\U0000C774", "\U0000B8E8", "\U0000B9C8"]

  - file: "WaveShare_ESP32_S3/fonts/Nunito-SemiBold.ttf"
    id: nunito_20
    size: 20
    bpp: 4
    glyphsets:
      - GF_Latin_Core
      - GF_Cyrillic_Core
      - GF_Latin_Vietnamese

  - file: "WaveShare_ESP32_S3/fonts/icons_v2.ttf"
    id: icons_28
    size: 28
    bpp: 4
    glyphs: ["\U0000e902", "\U0000e927"]

  - file: "WaveShare_ESP32_S3/fonts/icons_v2.ttf"
    id: icons_38
    size: 38
    bpp: 4
    glyphs: ["\U0000e909", "\U0000e90c", "\U0000e90d", "\U0000e912",
             "\U0000e913", "\U0000e914", "\U0000e90a", "\U0000e90b",
             "\U0000e91c", "\U0000e923", "\U0000e924"]

  - file: "WaveShare_ESP32_S3/fonts/icons_v2.ttf"
    id: icons_48
    size: 48
    bpp: 4
    glyphs: ["\U0000e90a", "\U0000e90b", "\U0000e91f", "\U0000e920",
             "\U0000e91c", "\U0000e923", "\U0000e924"]

image:
  - file: "SmartKnob/bg.png"
    id: bg_image_file
    type: RGB565
    resize: 360x360
    transparency: alpha_channel

  - file: "SmartKnob/mediaplayer/thumbnail.png"
    id: album_placeholder
    type: RGB565
    resize: 120x120
    transparency: alpha_channel

online_image:
  - url: "${homeassistant_thumbnail_url}"
    type: RGB565
    format: PNG
    id: media_image_jpeg
    resize: 120x120
    transparency: alpha_channel
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: album_cover_image
          src: media_image_jpeg
    on_error:
      - lvgl.image.update:
          id: album_cover_image
          src: album_placeholder

globals:
  - id: current_volume
    type: float
    initial_value: '0.5'

  - id: api_ready
    type: bool
    initial_value: 'false'

  # Grace period after connect — prevents spurious play/pause on startup
  - id: startup_grace
    type: bool
    initial_value: 'true'

  - id: current_media_title
    type: std::string
    initial_value: ""

  - id: duration_slider_user_interaction
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: slider_position
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: pending_cover_url
    type: std::string
    restore_value: no
    initial_value: '""'

api:
  on_client_connected:
    - delay: 2s
    - lambda: |-
        ESP_LOGI("media", "Home Assistant connected, initializing...");
        id(api_ready) = true;
        id(startup_grace) = true;
    - homeassistant.service:
        service: homeassistant.update_entity
        data:
          entity_id: $mediaplayer
    - delay: 1s
    - script.execute: refresh_media_data
    - delay: 8s
    - lambda: |-
        id(startup_grace) = false;
        ESP_LOGI("media", "Startup grace period ended");

text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: $mediaplayer
    on_value:
      - if:
          condition:
            lambda: 'return x == "paused";'
          then:
            - lvgl.label.update:
                id: play_pause_icon
                x: 0
                text: "${play_icon}"
          else:
            - lvgl.label.update:
                id: play_pause_icon
                x: 0
                text: "${pause_icon}"

  - platform: homeassistant
    id: media_player_cover
    entity_id: $mediaplayer
    attribute: entity_picture
    on_value:
      - lambda: |-
          id(pending_cover_url) = x;
      - script.execute: update_cover_script

  - platform: homeassistant
    id: media_player_title_sensor
    entity_id: $mediaplayer
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: media_player_title_label
          text: !lambda |-
            // Strip 3+ byte UTF-8 sequences (emoji U+1F000+, CJK, misc symbols like ★)
            // These fall outside the loaded font glyph set and render as [].
            // 2-byte sequences (Latin Extended, Cyrillic) are kept — they're in the font.
            std::string result;
            size_t i = 0;
            while (i < x.size()) {
              unsigned char c = (unsigned char)x[i];
              if (c < 0x80) {                          // 1-byte ASCII
                result += x[i++];
              } else if (c < 0xC0) {                   // stray continuation — skip
                i++;
              } else if (c < 0xE0) {                   // 2-byte (Latin, Cyrillic) — keep
                if (i + 1 < x.size()) { result += x[i]; result += x[i+1]; }
                i += 2;
              } else if (c < 0xF0) {                   // 3-byte (CJK, symbols) — replace
                result += ' ';
                i += 3;
              } else {                                  // 4-byte (emoji) — replace
                result += ' ';
                i += 4;
              }
            }
            return result;
      - delay: 2s
      - lambda: |-
          if (x != id(current_media_title)) {
            id(current_media_title) = x;
            if (!id(pending_cover_url).empty())
              id(update_cover_script)->execute();
          }

  - platform: homeassistant
    id: media_player_artist_sensor
    entity_id: $mediaplayer
    attribute: media_artist
    on_value:
      - delay: 1s
      - lvgl.label.update:
          id: media_player_artist_label
          text: !lambda |-
            std::string result;
            size_t i = 0;
            while (i < x.size()) {
              unsigned char c = (unsigned char)x[i];
              if (c < 0x80) { result += x[i++]; }
              else if (c < 0xC0) { i++; }
              else if (c < 0xE0) { if (i+1<x.size()){result+=x[i];result+=x[i+1];} i+=2; }
              else if (c < 0xF0) { result += ' '; i += 3; }
              else { result += ' '; i += 4; }
            }
            return result;

binary_sensor:
  - platform: template
    id: is_playing
    lambda: 'return id(media_player_state).state == "playing";'
    filters:
      - delayed_off: 500ms
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(api_ready) && !id(startup_grace);'
            then:
              - lvgl.page.show: media_player_page
    on_release:
      then:
        - if:
            condition:
              lambda: 'return id(api_ready);'
            then:
              - delay: 1s

sensor:
  # Single volume sensor — removed duplicate media_player_volume_level.
  # FIX: only update current_volume when x > 0 OR state is "playing".
  # This prevents HA reporting 0.0 on idle/paused from resetting the arc.
  - platform: homeassistant
    id: media_player_volume
    entity_id: $mediaplayer
    attribute: volume_level
    filters:
      - throttle: 200ms
      - heartbeat: 5s
    on_value:
      - if:
          condition:
            lambda: |-
              if (!id(api_ready) || isnan(x) || x < 0.0f || x > 1.0f) return false;
              // Accept non-zero values always.
              // Accept zero ONLY when actively playing (not idle/paused reset).
              if (x > 0.0f) return true;
              return id(media_player_state).state == "playing";
          then:
            - lambda: |-
                ESP_LOGI("media", "Volume update: %.2f (was %.2f)", x, id(current_volume));
                id(current_volume) = x;
            - lvgl.arc.update:
                id: volume_control_widget
                value: !lambda 'return (int)(x * 100);'
          else:
            - lambda: 'ESP_LOGD("media", "Volume %.2f ignored (state: %s)", x, id(media_player_state).state.c_str());'

  - platform: homeassistant
    id: media_player_media_duration
    entity_id: $mediaplayer
    attribute: media_duration
    on_value:
      then:
        - lambda: |-
            int dur = (int)roundf(x);
            lv_slider_set_range(id(media_player_duration_pos_slider), 0, dur);

  - platform: homeassistant
    id: media_position
    entity_id: $mediaplayer
    attribute: media_position
    on_value:
      then:
        - lvgl.label.update:
            id: time_label
            text: !lambda |-
              float posf = x, durf = id(media_player_media_duration).state;
              if (isnan(posf)) posf = 0;
              if (isnan(durf)) durf = 0;
              int pm=(int)posf/60, ps=(int)posf%60, dm=(int)durf/60, ds=(int)durf%60;
              char buf[32];
              snprintf(buf, sizeof(buf), "%d:%02d/%d:%02d", pm, ps, dm, ds);
              return std::string(buf);

script:
  - id: handle_duration_slider_release_script
    mode: restart
    then:
      - homeassistant.service:
          service: media_player.media_seek
          data:
            entity_id: !lambda 'return id(active_mediaplayer);'
            seek_position: !lambda 'return std::to_string(int(id(slider_position)));'
      - delay: 2s
      - lambda: 'id(duration_slider_user_interaction) = false;'

  - id: update_cover_script
    mode: restart
    then:
      - lambda: |-
          // Build thumbnail URL dynamically using active_mediaplayer
          // URL format: https://<ha_url>/api/<integration>/<entity_id>/thumbnail.png
          std::string base = "${homeassistant_url}";
          std::string intg = "${integration}";
          std::string entity = id(active_mediaplayer);
          std::string url = "https://" + base + "/api/" + intg + "/" + entity + "/thumbnail.png";
          ESP_LOGI("cover", "Fetching thumbnail: %s", url.c_str());
          id(media_image_jpeg)->set_url(url.c_str());
      - delay: 100ms
      - lambda: 'id(media_image_jpeg)->update();'

  - id: refresh_media_data
    then:
      - lambda: 'ESP_LOGI("media", "Refreshing all media state...");'
      # Clear stale display data immediately so user doesn't see old player's info
      - lambda: |-
          lv_label_set_text(id(media_player_title_label),  "...");
          lv_label_set_text(id(media_player_artist_label), "...");
          lv_label_set_text(id(time_label),                "0:00/0:00");
          lv_slider_set_value(id(media_player_duration_pos_slider), 0, LV_ANIM_OFF);
          lv_arc_set_value((lv_obj_t*)id(volume_control_widget), 0);
      # Reset cover to placeholder
      - lvgl.image.update:
          id: album_cover_image
          src: album_placeholder
      # Ask HA to push all current state for the active player.
      # This triggers on_value for all subscribed sensors (title, artist,
      # cover, volume, position, duration) if subscribed to same entity.
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: !lambda 'return id(active_mediaplayer);'
      - delay: 1s
      # Update volume arc from sensor if available
      - if:
          condition:
            lambda: 'return id(media_player_volume).has_state() && id(media_player_volume).state > 0;'
          then:
            - lambda: |-
                float vol = id(media_player_volume).state;
                ESP_LOGI("media", "Volume refreshed: %.2f", vol);
                id(current_volume) = vol;
            - lvgl.arc.update:
                id: volume_control_widget
                value: !lambda 'return id(current_volume) * 100;'
      # Trigger cover download in case entity_picture changed
      - script.execute: update_cover_script

  - id: volume_up
    then:
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - lambda: |-
                float v = std::min(id(current_volume) + 0.05f, 1.0f);
                id(current_volume) = v;
            - homeassistant.action:
                action: media_player.volume_set
                data:
                  entity_id: !lambda 'return id(active_mediaplayer);'
                  volume_level: !lambda 'return id(current_volume);'

  - id: volume_down
    then:
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - lambda: |-
                float v = std::max(id(current_volume) - 0.05f, 0.0f);
                id(current_volume) = v;
            - homeassistant.action:
                action: media_player.volume_set
                data:
                  entity_id: !lambda 'return id(active_mediaplayer);'
                  volume_level: !lambda 'return id(current_volume);'

  - id: media_play_pause
    then:
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.media_play_pause
                data:
                  entity_id: !lambda 'return id(active_mediaplayer);'

  - id: media_next
    then:
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.media_next_track
                data:
                  entity_id: !lambda 'return id(active_mediaplayer);'

  - id: media_previous
    then:
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.media_previous_track
                data:
                  entity_id: !lambda 'return id(active_mediaplayer);'

interval:
  - interval: 30s
    then:
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.service:
                service: homeassistant.update_entity
                data:
                  entity_id: $mediaplayer