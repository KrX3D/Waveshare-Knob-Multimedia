# Generated by esphome-code-assistant v1.0.0
# lvgl.yaml — single file, no companion yaml needed

substitutions:
  font: gfonts://Roboto
  mdi: fonts/materialdesignicons-webfont.ttf

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 500
    id: roboto_18_bold
    size: 18
  - file: "gfonts://Roboto"
    id: roboto_small
    size: 16
  - file: "gfonts://Roboto"
    id: roboto
    size: 20
  - file: "gfonts://Roboto"
    id: roboto_28
    size: 28
  - file: "gfonts://Roboto"
    id: roboto_36
    size: 36
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48

globals:
  - id: batt_percent
    type: int
    initial_value: '0'

  - id: display_counter
    type: int
    restore_value: false
    initial_value: '0'

  - id: time_str
    type: std::string
    initial_value: ""

  # 0=time_page  1=media_player_page  2=settings_page  3=info_page
  - id: active_page_id
    type: int
    restore_value: false
    initial_value: '0'

text_sensor:
  - platform: homeassistant
    entity_id: sensor.battery_level
    id: batt_lvl
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) {
              id(batt_percent) = (int)std::round(std::stof(x));
            }
        - lvgl.arc.update:
            id: batt_arc
            value: !lambda 'return id(batt_percent);'
        - lvgl.label.update:
            id: batt_text
            text: !lambda |-
              char buf[8];
              snprintf(buf, sizeof(buf), "%d%%", id(batt_percent));
              return std::string(buf);

sensor:
  - platform: homeassistant
    id: outdoor_temperature
    attribute: temperature
    entity_id: $weather
    on_value:
      then:
        - lvgl.label.update:
            id: temp_widget
            text: !lambda |-
              char b[16];
              snprintf(b, sizeof(b), "%.1fC", x);
              return std::string(b);

script:
  - id: update_time_labels
    then:
      - lambda: |-
          auto t = id(time_comp).now();
          // All ASCII — avoids UTF-8 rendering boxes (e.g. Mär → Mrz)
          static const char* days[]   = {"So.","Mo.","Di.","Mi.","Do.","Fr.","Sa."};
          static const char* months[] = {"Jan","Feb","Mrz","Apr","Mai","Jun",
                                         "Jul","Aug","Sep","Okt","Nov","Dez"};
          char buf[64];
          snprintf(buf, sizeof(buf), "%s %02u %s\n%02u:%02u:%02u",
                   days[t.day_of_week], t.day_of_month, months[t.month - 1],
                   t.hour, t.minute, t.second);
          id(time_str) = std::string(buf);
      - lvgl.label.update:
          id: date_time_widget
          text: !lambda 'return id(time_str);'

# Update battery label on media page + info page every 5s
interval:
  - interval: 5s
    then:
      - lambda: |-
          char buf[8];
          snprintf(buf, sizeof(buf), "%d%%", id(batt_percent));

          lv_color_t col;
          if      (id(batt_percent) > 50) col = lv_color_hex(0x00CC44);  // green
          else if (id(batt_percent) > 20) col = lv_color_hex(0xFFA500);  // orange
          else                            col = lv_color_hex(0x888888);  // grey

          // media page battery label
          lv_label_set_text(id(media_batt_label), buf);
          lv_obj_set_style_text_color(id(media_batt_label), col, 0);

          // info page battery label
          lv_label_set_text(id(info_batt_label), buf);
          lv_obj_set_style_text_color(id(info_batt_label), col, 0);

          // info page clock
          if (id(time_comp).now().is_valid()) {
            auto t = id(time_comp).now();
            char tbuf[8];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(info_time_label), tbuf);
          }

          // info page WiFi (reuse wifi_signal_settings from settings.yaml)
          if (id(wifi_signal_settings).has_state()) {
            int pct = (int)std::min(std::max(
                2.0f * ((float)id(wifi_signal_settings).state + 100.0f), 0.0f), 100.0f);
            char wbuf[24];
            snprintf(wbuf, sizeof(wbuf), "WiFi: %d%%", pct);
            lv_label_set_text(id(info_wifi_label), wbuf);
          }

          // info page heap (reuse heap_free_settings from settings.yaml)
          if (id(heap_free_settings).has_state()) {
            char hbuf[24];
            snprintf(hbuf, sizeof(hbuf), "Heap: %dkB",
                     (int)(id(heap_free_settings).state / 1024));
            lv_label_set_text(id(info_heap_label), hbuf);
          }

          // info page temperature
          if (id(outdoor_temperature).has_state()) {
            char tbuf2[12];
            snprintf(tbuf2, sizeof(tbuf2), "%.1f", id(outdoor_temperature).state);
            lv_label_set_text(id(info_temp_label), tbuf2);
          }

lvgl:
  id: my_lvgl
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  theme:
    button:
      bg_color: 0x2d2d2d
      bg_grad_color: 0x1a1a1a
      bg_grad_dir: VER
      bg_opa: COVER
      border_color: 0x666666
      border_width: 2
      border_opa: COVER
      text_color: 0xFFFFFF
    arc:
      arc_color: 0x444444   # unfilled arc portion = dark grey

  pages:

    # ════════════════════════════════════════════════
    # PAGE 0: time_page
    # ════════════════════════════════════════════════
    - id: time_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 0;'
      on_click:
        then:
          - if:
              condition:
                lambda: 'return id(api_ready);'
              then:
                - homeassistant.action:
                    action: media_player.media_play_pause
                    data:
                      entity_id: $mediaplayer
      on_swipe_left:
        then:
          - lvgl.page.show:
              id: media_player_page
              animation: MOVE_LEFT
      widgets:
        - image:
            id: bg_image_time
            src: bg_image_file
            align: CENTER
            width: 100%
            height: 100%

        - label:
            id: date_time_widget
            text_font: roboto_36
            text_color: 0x000000
            align: CENTER
            y: 10
            long_mode: WRAP
            text_align: CENTER
            text: !lambda 'return id(time_str);'

        - label:
            id: temp_widget
            text_font: roboto_36
            text_color: 0x000000
            align: CENTER
            y: 100
            text: "–C"

        # Battery arc — top area
        - arc:
            id: batt_arc
            align: CENTER
            y: -120
            width: 80
            height: 80
            start_angle: 135
            end_angle: 45
            arc_width: 8
            arc_color: 0x00CC44
            value: 0
            min_value: 0
            max_value: 100

        # Battery % text inside arc — roboto fits and is readable
        - label:
            id: batt_text
            text_font: roboto
            text_color: 0x000000
            align: CENTER
            y: -120
            text: "--%"

    # ════════════════════════════════════════════════
    # PAGE 1: media_player_page
    # ════════════════════════════════════════════════
    - id: media_player_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 1;'
      on_click:
        then:
          - homeassistant.action:
              action: media_player.media_play_pause
              data:
                entity_id: $mediaplayer
      on_swipe_left:
        then:
          - lvgl.page.show:
              id: info_page
              animation: MOVE_LEFT
      on_swipe_right:
        then:
          - lvgl.page.show:
              id: time_page
              animation: MOVE_RIGHT
      widgets:
        - image:
            id: bg_image_mediaplayer
            src: bg_image_file
            align: CENTER
            width: 100%
            height: 100%

        # Battery indicator top-left
        - label:
            id: media_batt_label
            align: TOP_LEFT
            x: 28
            y: 18
            text_font: roboto_small
            text_color: 0x00CC44
            text: "--%"

        # Album cover
        - obj:
            id: media_cover
            width: 120
            height: 120
            align: CENTER
            scrollable: false
            scrollbar_mode: "OFF"
            y: -80
            bg_opa: TRANSP
            border_width: 0
            radius: 15
            shadow_opa: TRANSP
            clip_corner: true
            widgets:
              - image:
                  id: album_cover_image
                  src: album_placeholder
                  align: CENTER

        - label:
            id: media_player_artist_label
            text_font: nunito_16
            text_color: 0x000000
            align: CENTER
            width: 80%
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            y: 0
            text: "No Artist"

        - label:
            id: media_player_title_label
            text_font: nunito_20
            text_color: 0x000000
            align: CENTER
            width: 80%
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            y: 30
            text: "Title"

        - slider:
            id: media_player_duration_pos_slider
            width: 50%
            min_value: 0
            max_value: 100
            height: 8
            align: CENTER
            y: 60
            on_press:
              - lambda: 'id(duration_slider_user_interaction) = true;'
            on_release:
              then:
                - lambda: 'id(slider_position) = x;'
                - script.execute: handle_duration_slider_release_script

        - label:
            id: time_label
            text_font: roboto_18_bold
            text_color: 0x000000
            align: CENTER
            y: 85
            width: 50%
            text_align: CENTER
            long_mode: DOT
            text: "0:00/0:00"

        - arc:
            id: volume_control_widget
            adv_hittest: true
            align: CENTER
            y: 0
            width: 320
            height: 320
            adjustable: true
            arc_width: 8
            arc_color: 0x00BFFF
            start_angle: 135
            end_angle: 45
            on_value:
              then:
                - lambda: |-
                    float vol = x / 100.0;
                    id(current_volume) = vol;
                    ESP_LOGI("volume", "Volume arc: %.2f", vol);
                - homeassistant.action:
                    action: media_player.volume_set
                    data:
                      entity_id: $mediaplayer
                      volume_level: !lambda 'return float(x) / 100.0;'

        - obj:
            id: control_buttons_container
            width: 200
            height: 50
            align: BOTTOM_MID
            y: -30
            bg_opa: TRANSP
            border_width: 0
            border_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - button:
                  id: btn_previous
                  width: 50
                  height: 50
                  align: LEFT_MID
                  checkable: false
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 8
                  shadow_opa: TRANSP
                  on_click:
                    then:
                      - homeassistant.action:
                          action: media_player.media_previous_track
                          data:
                            entity_id: "${mediaplayer}"
                  widgets:
                    - label:
                        align: CENTER
                        text_font: icons_38
                        text: "${back_step_icon}"
                        text_color: 0xFF6F61

              - button:
                  id: media_player_state_label
                  width: 60
                  height: 60
                  align: CENTER
                  checkable: false
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 10
                  shadow_opa: TRANSP
                  on_click:
                    then:
                      - homeassistant.action:
                          action: media_player.media_play_pause
                          data:
                            entity_id: $mediaplayer
                  widgets:
                    - label:
                        id: play_pause_icon
                        text_font: icons_48
                        text: "${pause_icon}"
                        align: CENTER
                        text_color: 0xFF6F61

              - button:
                  id: btn_next
                  width: 50
                  height: 50
                  align: RIGHT_MID
                  checkable: false
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 8
                  shadow_opa: TRANSP
                  on_click:
                    then:
                      - homeassistant.action:
                          action: media_player.media_next_track
                          data:
                            entity_id: "${mediaplayer}"
                  widgets:
                    - label:
                        align: CENTER
                        text_font: icons_38
                        text: "${forward_step_icon}"
                        text_color: 0xFF6F61

    # ════════════════════════════════════════════════
    # PAGE 3: info_page  (swipe left from media)
    # ════════════════════════════════════════════════
    - id: info_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 3;'
      on_swipe_right:
        then:
          - lvgl.page.show:
              id: media_player_page
              animation: MOVE_RIGHT
      widgets:
        - image:
            src: bg_image_file
            align: CENTER
            width: 100%
            height: 100%

        - label:
            align: TOP_MID
            y: 22
            text_font: roboto_28
            text_color: 0x000000
            text: "Info"

        # Dummy labels to keep IDs valid (referenced in interval lambda)
        - label:
            id: info_time_label
            align: CENTER
            y: 0
            text_font: roboto_small
            text_color: 0x000000
            opa: 0
            text: ""

        - label:
            id: info_temp_label
            align: CENTER
            y: 0
            text_font: roboto_small
            text_color: 0x000000
            opa: 0
            text: ""

        - label:
            id: info_wifi_label
            align: CENTER
            y: -40
            text_font: roboto_28
            text_color: 0x000000
            text: "WiFi: –"

        - label:
            id: info_heap_label
            align: CENTER
            y: 10
            text_font: roboto_28
            text_color: 0x000000
            text: "Heap: –"

        - label:
            id: info_batt_label
            align: CENTER
            y: 60
            text_font: roboto_28
            text_color: 0x000000
            text: "Batt: --%"

        - label:
            align: BOTTOM_MID
            y: -18
            text_font: roboto_small
            text_color: 0x666666
            text: "< swipe to media"