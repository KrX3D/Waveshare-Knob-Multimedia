# Generated by esphome-code-assistant v1.0.0
# rotary_encoder.yaml — fixed: uncapped counter, screen wake on rotate

external_components:
  - source:
      type: git
      url: https://github.com/KrX3D/WaveShare-Knob-Esp32S3
      ref: new_test
    refresh: always

sensor:
  - platform: rotary_encoder_custom
    name: "Rotary Encoder"
    id: rotary_counter
    pin_a: 8
    pin_b: 7
    # FIX: removed min_value/max_value — the counter was capping at 100 steps,
    # making delta=0 and blocking volume increase beyond that point.
    # Volume clamping is handled in the lambda below instead.
    restore_mode: RESTORE_DEFAULT_ZERO
    on_value:
      then:
        - globals.set:
            id: display_counter
            value: !lambda 'return (int)x;'
        # FIX: wake the display on rotation, same as touch
        - script.execute: screentime
        - lambda: |-
            int curr = (int)x;
            static int prev = 0;
            static bool initialized = false;

            if (!initialized) {
              prev = curr;
              initialized = true;
              return;
            }

            int delta = curr - prev;

            // handle large wrap-around jumps
            if (delta > 10000) delta -= 65536;
            else if (delta < -10000) delta += 65536;

            if (delta == 0) { prev = curr; return; }

            prev = curr;

            const int STEP_PCT = 5;
            float vol = id(current_volume) + (delta * STEP_PCT / 100.0f);
            vol = std::max(0.0f, std::min(1.0f, vol));

            id(current_volume) = vol;
            lv_arc_set_value((lv_obj_t*)id(volume_control_widget), (int)round(vol * 100.0f));
            lv_obj_invalidate((lv_obj_t*)id(volume_control_widget));

            ESP_LOGI("rotary", "delta=%d -> volume=%.2f", delta, vol);
        - drv2605.play_effect:
            id: haptic_driver
            effect: 7
        - homeassistant.action:
            action: media_player.volume_set
            data:
              entity_id: $mediaplayer
              volume_level: !lambda 'return id(current_volume);'