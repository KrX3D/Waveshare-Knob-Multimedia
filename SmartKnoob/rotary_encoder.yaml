# Generated by esphome-code-assistant v1.0.0
# rotary_encoder.yaml
# - Volume only on media_player_page
# - Scroll settings on settings_page
# - Display off = wake only, no volume/scroll change

external_components:
  - source:
      type: git
      url: https://github.com/KrX3D/WaveShare-Knob-Esp32S3
      ref: new_test
    refresh: always

sensor:
  - platform: rotary_encoder_custom
    name: "Rotary Encoder"
    id: rotary_counter
    pin_a: 8
    pin_b: 7
    # No min/max — volume clamping done in lambda; removing cap prevents stuck-at-100 bug
    restore_mode: RESTORE_DEFAULT_ZERO
    on_value:
      then:
        - globals.set:
            id: display_counter
            value: !lambda 'return (int)x;'
        - lambda: |-
            int curr = (int)x;
            static int prev = 0;
            static bool initialized = false;

            if (!initialized) { prev = curr; initialized = true; return; }

            int delta = curr - prev;
            if (delta > 10000) delta -= 65536;
            else if (delta < -10000) delta += 65536;
            if (delta == 0) { prev = curr; return; }
            prev = curr;

            // ── Case 1: Display is off — just wake it, ignore the rotation ──
            if (id(back_light).current_values.get_brightness() < 0.01f) {
              return;
            }

            // ── Case 2: Settings page — scroll content ──────────────────────
            if (id(active_page_id) == 2) {
              lv_obj_scroll_by(id(settings_scroll), 0, delta * -20, LV_ANIM_ON);
              return;
            }

            // ── Case 3: Media player page — volume control ───────────────────
            if (id(active_page_id) == 1) {
              float vol = std::max(0.0f, std::min(1.0f,
                  id(current_volume) + (delta * 5 / 100.0f)));
              id(current_volume) = vol;
              lv_arc_set_value((lv_obj_t*)id(volume_control_widget), (int)round(vol * 100.0f));
              lv_obj_invalidate((lv_obj_t*)id(volume_control_widget));
              ESP_LOGI("rotary", "vol %.2f", vol);
            }

            // ── Case 0: Time page — no action (could add brightness etc.) ───
        - if:
            condition:
              lambda: 'return id(back_light).current_values.get_brightness() < 0.01f;'
            then:
              # Display off → wake display only
              - script.execute: screentime
            else:
              - if:
                  condition:
                    lambda: 'return id(active_page_id) == 1;'
                  then:
                    - drv2605.play_effect:
                        id: haptic_driver
                        effect: 7    # soft bump
                    - homeassistant.action:
                        action: media_player.volume_set
                        data:
                          entity_id: $mediaplayer
                          volume_level: !lambda 'return id(current_volume);'