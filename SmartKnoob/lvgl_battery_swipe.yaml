# Generated by esphome-code-assistant v1.0.0
# lvgl_battery_swipe.yaml
# Patches for lvgl.yaml:
# - Battery status on time_page and media_player_page
# - Swipe left/right between pages
# - active_page_id global updated on page show
# - New "quick info" page (page 3) accessible by swiping right from media_player_page
#
# Include this as an additional package:
#   lvgl_extras: !include SmartKnob/lvgl_battery_swipe.yaml
#
# This file EXTENDS the existing lvgl: block — ESPHome merges lvgl: pages from packages.

lvgl:
  pages:

    # ── Patch time_page — add battery + swipe ─────────────────────────────
    - id: time_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 0;'
      on_swipe_left:
        then:
          - lvgl.page.show:
              id: media_player_page
              animation: MOVE_LEFT
      # on_swipe_right → could go to info_page if desired
      widgets:

        # Battery bar — top-left, small and unobtrusive
        - obj:
            id: time_batt_container
            align: TOP_LEFT
            x: 28
            y: 28
            width: 70
            height: 22
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: time_batt_icon
                  align: LEFT_MID
                  text_font: roboto_small
                  text_color: 0x00FF00
                  text: "B"         # replace with battery icon glyph if available
              - label:
                  id: time_batt_label
                  align: RIGHT_MID
                  text_font: roboto_small
                  text_color: 0xCCCCCC
                  text: "--%"

    # ── Patch media_player_page — add battery + swipe ──────────────────────
    - id: media_player_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 1;'
      on_swipe_right:
        then:
          - lvgl.page.show:
              id: time_page
              animation: MOVE_RIGHT
      on_swipe_left:
        then:
          - lvgl.page.show:
              id: info_page
              animation: MOVE_LEFT
      widgets:

        # Battery — top-left
        - obj:
            id: media_batt_container
            align: TOP_LEFT
            x: 28
            y: 28
            width: 70
            height: 22
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: media_batt_icon
                  align: LEFT_MID
                  text_font: roboto_small
                  text_color: 0x00FF00
                  text: "B"
              - label:
                  id: media_batt_label
                  align: RIGHT_MID
                  text_font: roboto_small
                  text_color: 0xCCCCCC
                  text: "--%"

    # ── Patch settings_page — track active page ────────────────────────────
    - id: settings_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 2;'

    # ── New: info_page (page 3) — swipe left from media player ────────────
    # Simple at-a-glance info page: time, weather, heap, WiFi
    - id: info_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 3;'
      on_swipe_right:
        then:
          - lvgl.page.show:
              id: media_player_page
              animation: MOVE_RIGHT
      widgets:

        - image:
            src: bg_image_file
            align: CENTER
            width: 100%
            height: 100%

        - label:
            align: TOP_MID
            y: 30
            text_font: roboto_28
            text_color: 0x000000
            text: "Info"

        # Large time
        - label:
            id: info_time_label
            align: CENTER
            y: -50
            text_font: roboto_48
            text_color: 0x000000
            text: "--:--"

        # Temperature
        - label:
            id: info_temp_label
            align: CENTER
            y: 10
            text_font: roboto_36
            text_color: 0x000000
            text: "–°"

        # WiFi + heap row
        - label:
            id: info_wifi_label
            align: CENTER
            y: 60
            text_font: roboto_small
            text_color: 0x333333
            text: "WiFi: –"

        - label:
            id: info_heap_label
            align: CENTER
            y: 82
            text_font: roboto_small
            text_color: 0x333333
            text: "Heap: –"

        # Battery
        - label:
            id: info_batt_label
            align: CENTER
            y: 104
            text_font: roboto_small
            text_color: 0x333333
            text: "Batt: --%"

        # Swipe hint
        - label:
            align: BOTTOM_MID
            y: -18
            text_font: roboto_small
            text_color: 0x666666
            text: "< swipe to media"

# ── Keep battery labels and info_page updated ─────────────────────────────
interval:
  - interval: 5s
    then:
      - lambda: |-
          // Battery label update for all pages
          char buf[16];
          bool chg = id(is_charging);
          snprintf(buf, sizeof(buf), "%d%%", id(batt_percent));  // no + to save space

          // Color: green >50%, orange >20%, red <=20%
          lv_color_t col;
          if (id(batt_percent) > 50)       col = lv_color_hex(0x00CC44);
          else if (id(batt_percent) > 20)  col = lv_color_hex(0xFFA500);
          else                             col = lv_color_hex(0xFF3333);

          lv_label_set_text(id(time_batt_label),  buf);
          lv_label_set_text(id(media_batt_label), buf);
          lv_label_set_text(id(info_batt_label),  buf);

          lv_obj_set_style_text_color(id(time_batt_label),  col, 0);
          lv_obj_set_style_text_color(id(media_batt_label), col, 0);
          lv_obj_set_style_text_color(id(time_batt_icon),   col, 0);
          lv_obj_set_style_text_color(id(media_batt_icon),  col, 0);

          // info_page time
          if (id(time_comp).now().is_valid()) {
            auto t = id(time_comp).now();
            char tbuf[8];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(info_time_label), tbuf);
          }

          // info_page WiFi signal
          if (id(wifi_signal_settings).has_state()) {
            int pct = (int)std::min(std::max(
                2.0f * ((float)id(wifi_signal_settings).state + 100.0f), 0.0f), 100.0f);
            char wbuf[24];
            snprintf(wbuf, sizeof(wbuf), "WiFi: %d%%", pct);
            lv_label_set_text(id(info_wifi_label), wbuf);
          }

          // info_page heap
          if (id(heap_free_settings).has_state()) {
            char hbuf[24];
            snprintf(hbuf, sizeof(hbuf), "Heap: %dkB",
                     (int)(id(heap_free_settings).state / 1024));
            lv_label_set_text(id(info_heap_label), hbuf);
          }

      # info_page temperature — reuse outdoor_temperature from lvgl.yaml
      - lvgl.label.update:
          id: info_temp_label
          text: !lambda |-
            char b[16];
            float t = id(outdoor_temperature).state;
            if (isnan(t)) return std::string("–°");
            snprintf(b, sizeof(b), "%.1fC", t);  // plain ASCII avoids degree glyph issues
            return std::string(b);