# Generated by esphome-code-assistant v1.0.0
# settings.yaml — settings overlay page for SmartKnob
# Open: hold screen 2s anywhere (long_press_settings script in waveshare.yaml)
# Close: tap the ✕ button top-right, or hold 2s again

globals:
  - id: is_charging
    type: bool
    initial_value: 'false'

lvgl:
  pages:
    - id: settings_page
      widgets:

        # ── Full-circle dark background ─────────────────────────────────────
        - obj:
            width: 360
            height: 360
            align: CENTER
            bg_color: 0x111111
            bg_opa: COVER
            border_color: 0x00BFFF
            border_width: 2
            radius: 180
            pad_all: 0
            clip_corner: true

            widgets:

              # ── Title ────────────────────────────────────────────────────
              - label:
                  align: TOP_MID
                  y: 20
                  text_font: roboto_28
                  text_color: 0xFFFFFF
                  text: "Settings"

              # ── Close button ─────────────────────────────────────────────
              - button:
                  align: TOP_RIGHT
                  x: -28
                  y: 16
                  width: 44
                  height: 44
                  bg_color: 0x2d2d2d
                  bg_opa: COVER
                  border_color: 0x555555
                  border_width: 1
                  radius: 22
                  shadow_opa: TRANSP
                  on_click:
                    then:
                      - lvgl.page.show: time_page   # go back to clock
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_28
                        text_color: 0xFF6666
                        text: "X"

              # ── Scrollable content ────────────────────────────────────────
              - obj:
                  id: settings_scroll
                  align: TOP_MID
                  y: 60
                  width: 280
                  height: 248
                  bg_opa: TRANSP
                  border_width: 0
                  scrollable: true
                  scroll_dir: VER
                  scrollbar_mode: "OFF"

                  widgets:

                    # ════════ WiFi ════════
                    - label:
                        align: TOP_MID
                        y: 0
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "  WiFi  "

                    - obj:   # separator line
                        align: TOP_MID
                        y: 24
                        width: 240
                        height: 2
                        bg_color: 0x00BFFF
                        bg_opa: 60%
                        border_width: 0
                        radius: 0

                    - label:
                        id: lbl_wifi_ssid
                        align: TOP_LEFT
                        y: 32
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        long_mode: DOT
                        width: 260
                        text: "SSID: –"

                    - label:
                        id: lbl_wifi_ip
                        align: TOP_LEFT
                        y: 54
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "IP: –"

                    - label:
                        id: lbl_wifi_gw
                        align: TOP_LEFT
                        y: 74
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "GW: –"

                    - label:
                        id: lbl_wifi_dns
                        align: TOP_LEFT
                        y: 94
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "DNS: –"

                    - label:
                        id: lbl_wifi_db
                        align: TOP_LEFT
                        y: 114
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Signal: –"

                    # ════════ Battery ════════
                    - label:
                        align: TOP_MID
                        y: 144
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "  Battery  "

                    - obj:
                        align: TOP_MID
                        y: 168
                        width: 240
                        height: 2
                        bg_color: 0x00BFFF
                        bg_opa: 60%
                        border_width: 0
                        radius: 0

                    - label:
                        id: lbl_batt_v
                        align: TOP_LEFT
                        y: 176
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Voltage: –"

                    - label:
                        id: lbl_batt_pct
                        align: TOP_LEFT
                        y: 196
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Level: –"

                    - label:
                        id: lbl_charging
                        align: TOP_LEFT
                        y: 216
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Charging: –"

                    # ════════ System ════════
                    - label:
                        align: TOP_MID
                        y: 248
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "  System  "

                    - obj:
                        align: TOP_MID
                        y: 272
                        width: 240
                        height: 2
                        bg_color: 0x00BFFF
                        bg_opa: 60%
                        border_width: 0
                        radius: 0

                    - label:
                        id: lbl_heap
                        align: TOP_LEFT
                        y: 280
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Heap: –"

                    - label:
                        id: lbl_esphome_ver
                        align: TOP_LEFT
                        y: 300
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "ESPHome: –"

                    - label:
                        id: lbl_ntp_status
                        align: TOP_LEFT
                        y: 320
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "NTP: –"

# ── Sensors that feed the settings labels ──────────────────────────────────
text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ssid), "SSID: %s", x.c_str());

    ip_address:
      id: wifi_ip_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ip), "IP: %s", x.c_str());

    dns_address:
      id: wifi_dns_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_dns), "DNS: %s", x.c_str());

  - platform: version
    id: esphome_version_sensor
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_label_set_text_fmt(id(lbl_esphome_ver), "ESPHome: v%s", x.c_str());

sensor:
  - platform: wifi_signal
    id: wifi_signal_settings
    internal: true
    update_interval: 30s
    on_value:
      then:
        - lambda: |-
            int pct = (int)std::min(std::max(2.0f * (x + 100.0f), 0.0f), 100.0f);
            lv_label_set_text_fmt(id(lbl_wifi_db), "Signal: %.0fdB (%d%%)", x, pct);

  - platform: debug
    free:
      id: heap_free_settings
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_heap), "Heap: %.0fB", x);

# Update NTP sync status via time component
interval:
  - interval: 60s
    then:
      - lambda: |-
          if (id(time_comp).now().is_valid()) {
            auto t = id(time_comp).now();
            char buf[32];
            snprintf(buf, sizeof(buf), "NTP: OK %02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(lbl_ntp_status), buf);
          } else {
            lv_label_set_text(id(lbl_ntp_status), "NTP: not synced");
          }
      # Keep charging status current
      - lambda: |-
          float v = id(battery_voltage).state;
          bool chg = (!isnan(v) && v > 4.21f);
          id(is_charging) = chg;
          lv_label_set_text(id(lbl_charging), chg ? "Charging: YES  +" : "Charging: NO");
          if (chg) {
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0x00FF88), 0);
          } else {
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0xCCCCCC), 0);
          }