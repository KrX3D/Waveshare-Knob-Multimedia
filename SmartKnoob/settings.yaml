# Generated by esphome-code-assistant v1.0.0
# settings.yaml — settings page for SmartKnob
# Open by holding the display for 2 seconds (long_press_settings script in waveshare.yaml)
# Close by tapping the X button or holding again

globals:
  - id: is_charging
    type: bool
    initial_value: 'false'

# Detect charging: voltage > 4.21V means USB power is connected
# (battery max is ~4.20V when full, USB pushes it slightly above)
interval:
  - interval: 10s
    then:
      - lambda: |-
          float v = id(battery_voltage).state;
          bool was_charging = id(is_charging);
          id(is_charging) = (!isnan(v) && v > 4.21f);
          if (id(is_charging) != was_charging) {
            // Update charging indicator on settings page
            if (id(is_charging)) {
              lv_label_set_text(id(lbl_charging), "Charging: YES");
            } else {
              lv_label_set_text(id(lbl_charging), "Charging: NO");
            }
          }

lvgl:
  pages:
    - id: settings_page
      widgets:
        # Dark background
        - obj:
            width: 360
            height: 360
            align: CENTER
            bg_color: 0x1a1a1a
            bg_opa: COVER
            border_width: 0
            radius: 180
            pad_all: 0

            widgets:
              # Header bar
              - label:
                  id: settings_title
                  align: TOP_MID
                  y: 18
                  text_font: roboto_28
                  text_color: 0xFFFFFF
                  text: "Settings"

              # Close button (top-right)
              - button:
                  align: TOP_RIGHT
                  x: -22
                  y: 14
                  width: 40
                  height: 40
                  bg_opa: TRANSP
                  border_width: 0
                  radius: 20
                  shadow_opa: TRANSP
                  on_click:
                    then:
                      - lvgl.page.show: time_page
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_28
                        text_color: 0xFF6666
                        text: "X"

              # Scrollable content area
