                      - lvgl.page.show: time_page
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_28
                        text_color: 0xFF6666
                        text: "X"

              # Scrollable content — narrower to stay inside the circle
              - obj:
                  id: settings_scroll
                  align: TOP_MID
                  y: 62
