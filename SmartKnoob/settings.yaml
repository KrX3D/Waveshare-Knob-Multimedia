# Update settings labels whenever the page becomes visible
# Triggered by on_show or periodically
text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ssid), "SSID: %s", x.c_str());

    ip_address:
      id: wifi_ip_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ip), "IP: %s", x.c_str());

    dns_address:
      id: wifi_dns_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_dns), "DNS: %s", x.c_str());

  - platform: version
    id: esphome_version_sensor
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_label_set_text_fmt(id(lbl_esphome_ver), "v%s", x.c_str());

sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB (settings)"
    id: wifi_signal_settings
    internal: true
    update_interval: 30s
    on_value:
      then:
        - lambda: |-
            int pct = (int)std::min(std::max(2 * (x + 100.0f), 0.0f), 100.0f);
            lv_label_set_text_fmt(id(lbl_wifi_db), "Signal: %.0fdB (%d%%)", x, pct);

  - platform: debug
    free:
      id: heap_free_settings
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_heap), "Heap: %.0f B", x);

# Battery labels updated from adc_battery.yaml on_value callbacks
# These lambdas patch in from battery_voltage and battery_percentage sensors.
# Hook them in your adc_battery.yaml on_value, or let the interval above handle it.