# Generated by esphome-code-assistant v1.0.0
# settings.yaml — settings page, open by holding screen 2s

globals:
  - id: is_charging
    type: bool
    initial_value: 'false'

lvgl:
  pages:
    - id: settings_page
      widgets:

        # Full dark circle background
        - obj:
            width: 360
            height: 360
            align: CENTER
            bg_color: 0x111111
            bg_opa: COVER
            border_color: 0x00BFFF
            border_width: 2
            radius: 180
            pad_all: 0
            clip_corner: true

            widgets:

              # Title
              - label:
                  align: TOP_MID
                  y: 18
                  text_font: roboto_28
                  text_color: 0xFFFFFF
                  text: "Settings"

              # Close button — moved inward so it's inside the circle
              - button:
                  align: TOP_MID
                  x: 110       # ~center + 110px = near right but inside 180px radius
                  y: 14
                  width: 42
                  height: 42
                  bg_color: 0x3a0000
                  bg_opa: COVER
                  border_color: 0xFF4444
                  border_width: 1
                  radius: 21
                  shadow_opa: TRANSP
                  on_click:
                    then:
                      - lvgl.page.show: time_page
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_28
                        text_color: 0xFF6666
                        text: "X"

              # Scrollable content — narrower to stay inside the circle
              - obj:
                  id: settings_scroll
                  align: TOP_MID
                  y: 62
                  width: 260
                  height: 250
                  bg_opa: TRANSP
                  border_width: 0
                  scrollable: true
                  scroll_dir: VER
                  scrollbar_mode: "OFF"

                  widgets:

                    # ════════ WiFi ════════
                    - label:
                        align: TOP_MID
                        y: 0
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "WiFi"

                    - obj:
                        align: TOP_MID
                        y: 22
                        width: 220
                        height: 1
                        bg_color: 0x00BFFF
                        bg_opa: COVER
                        border_width: 0

                    - label:
                        id: lbl_wifi_ssid
                        align: TOP_LEFT
                        y: 28
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        long_mode: DOT
                        width: 240
                        text: "SSID: –"

                    - label:
                        id: lbl_wifi_ip
                        align: TOP_LEFT
                        y: 48
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "IP: –"

                    - label:
                        id: lbl_wifi_gw
                        align: TOP_LEFT
                        y: 68
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "GW: –"

                    - label:
                        id: lbl_wifi_dns
                        align: TOP_LEFT
                        y: 88
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "DNS: –"

                    - label:
                        id: lbl_wifi_db
                        align: TOP_LEFT
                        y: 108
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Signal: –"

                    # ════════ Battery ════════
                    - label:
                        align: TOP_MID
                        y: 136
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "Battery"

                    - obj:
                        align: TOP_MID
                        y: 158
                        width: 220
                        height: 1
                        bg_color: 0x00BFFF
                        bg_opa: COVER
                        border_width: 0

                    - label:
                        id: lbl_batt_v
                        align: TOP_LEFT
                        y: 164
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Voltage: –"

                    - label:
                        id: lbl_batt_pct
                        align: TOP_LEFT
                        y: 184
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Level: –"

                    # Charging label — y adjusted so it's well inside circle
                    - label:
                        id: lbl_charging
                        align: TOP_LEFT
                        y: 204
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Charging: –"

                    # ════════ Haptic ════════
                    - label:
                        align: TOP_MID
                        y: 232
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "Haptic"

                    - obj:
                        align: TOP_MID
                        y: 254
                        width: 220
                        height: 1
                        bg_color: 0x00BFFF
                        bg_opa: COVER
                        border_width: 0

                    - label:
                        id: lbl_haptic_val
                        align: TOP_MID
                        y: 260
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Strength: 127"

                    # Haptic strength slider (0–127; above 127 = reverse on DRV2605)
