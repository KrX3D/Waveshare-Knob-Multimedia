# Generated by esphome-code-assistant v1.0.0
# settings.yaml — settings page, open by holding screen 2s

globals:
  - id: is_charging
    type: bool
    initial_value: 'false'

  # Runtime-switchable media player entity ID
  # restore_value: true so the last selection survives reboots
  - id: active_mediaplayer
    type: std::string
    restore_value: true
    initial_value: '"${mediaplayer}"'

  # Cached options string from HA input_select — used to rebuild dropdown
  - id: mediaplayer_options_cache
    type: std::string
    restore_value: false
    initial_value: '""'

lvgl:
  pages:
    - id: settings_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 2;'
          - lambda: |-
              // Disable elastic overscroll so content can't scroll beyond top/bottom
              lv_obj_clear_flag(id(settings_scroll), LV_OBJ_FLAG_SCROLL_ELASTIC);
              lv_obj_clear_flag(id(settings_scroll), LV_OBJ_FLAG_SCROLL_MOMENTUM);
              lv_obj_scroll_to_y(id(settings_scroll), 0, LV_ANIM_OFF);
              // Preselect dropdown to match active_mediaplayer global
              // Scan dropdown options (built dynamically from HA) for match
              std::string active_mp = id(active_mediaplayer);
              // lv_dropdown_get_options returns all options as \n-separated string
              const char* all_opts1 = lv_dropdown_get_options((lv_obj_t*)id(mediaplayer_dropdown));
              std::string opts_str1(all_opts1 ? all_opts1 : "");
              uint16_t sel1 = 0, idx1 = 0;
              size_t p1 = 0;
              while (true) {
                size_t e1 = opts_str1.find('\n', p1);
                std::string tok1 = opts_str1.substr(p1, e1 == std::string::npos ? std::string::npos : e1 - p1);
                if (tok1 == active_mp) { sel1 = idx1; break; }
                if (e1 == std::string::npos) break;
                p1 = e1 + 1; idx1++;
              }
              lv_dropdown_set_selected((lv_obj_t*)id(mediaplayer_dropdown), sel1);
              lv_label_set_text_fmt(id(lbl_mediaplayer_current),
                                    "Active: %s", active_mp.c_str());
              // Sync timeout slider to actual current value on page open
              int timeout_cur = (int)id(display_timeout).state;
              lv_slider_set_value(id(timeout_slider), timeout_cur, LV_ANIM_OFF);
              char buf[24];
              snprintf(buf, sizeof(buf), "Timeout: %ds", timeout_cur);
              lv_label_set_text(id(lbl_timeout_val), buf);
              // Sync haptic slider label
              lv_label_set_text(id(lbl_haptic_val), "Strength: 127");
      widgets:

        # Full dark circle background
        - obj:
            width: 360
            height: 360
            align: CENTER
            bg_color: 0x111111
            bg_opa: COVER
            border_color: 0x00BFFF
            border_width: 2
            radius: 180
            pad_all: 0
            clip_corner: true

