                                uint16_t target = (uint16_t)x;
                                uint16_t cur_idx = 0;
                                std::string selected;
                                size_t pp = 0;
                                while (true) {
                                  size_t nl = all_str.find('\n', pp);
                                  std::string tok = all_str.substr(pp, nl == std::string::npos ? std::string::npos : nl - pp);
