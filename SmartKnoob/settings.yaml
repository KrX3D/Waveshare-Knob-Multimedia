# ── Sensors populating settings labels ─────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ssid), "SSID: %s", x.c_str());
    ip_address:
      id: wifi_ip_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              if (!x.empty() && x != "0.0.0.0")
                lv_label_set_text_fmt(id(lbl_wifi_ip), "IP: %s", x.c_str());
    dns_address:
      id: wifi_dns_sensor
      internal: true
      on_value:
        then:
          # Guard against 0.0.0.0 which fires before DHCP completes
          - lambda: |-
              // wifi_info fires once per DNS entry; only update on first non-zero value
              static bool dns_set = false;
              if (!dns_set && !x.empty() && x != "0.0.0.0") {
                lv_label_set_text_fmt(id(lbl_wifi_dns), "DNS: %s", x.c_str());
                dns_set = true;
              }

  - platform: version
    id: esphome_version_sensor
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string ver = x;
            auto pos = ver.find(" (");
            if (pos != std::string::npos) ver = ver.substr(0, pos);
            lv_label_set_text_fmt(id(lbl_esphome_ver), "ESPHome: %s", ver.c_str());

  # Sync current selection from HA input_select state
  - platform: homeassistant
    id: mediaplayer_select_state
    entity_id: input_select.media_player_thumbnail_source
    internal: true
    on_value:
      then:
        - lambda: |-
            // Update global and label
            id(active_mediaplayer) = x;
            lv_label_set_text_fmt(id(lbl_mediaplayer_current), "Active: %s", x.c_str());
            // Find x in dropdown options and select it
            const char* all_opts2 = lv_dropdown_get_options((lv_obj_t*)id(mediaplayer_dropdown));
            std::string opts_str2(all_opts2 ? all_opts2 : "");
            uint16_t idx2 = 0;
            size_t p2 = 0;
            while (true) {
              size_t e2 = opts_str2.find('\n', p2);
              std::string tok2 = opts_str2.substr(p2, e2 == std::string::npos ? std::string::npos : e2 - p2);
              if (tok2 == x) { lv_dropdown_set_selected((lv_obj_t*)id(mediaplayer_dropdown), idx2); break; }
              if (e2 == std::string::npos) break;
              p2 = e2 + 1; idx2++;
            }

  # Get options list from HA input_select and rebuild dropdown dynamically
  - platform: homeassistant
    id: mediaplayer_options_sensor
    entity_id: input_select.media_player_thumbnail_source
    attribute: options
    internal: true
    on_value:
      then:
        - lambda: |-
            // x is the options list as a comma-separated string from HA
            // e.g. "None,media_player.krx_amd_pc,media_player.elitebook_g3,..."
            if (x.empty()) return;
            id(mediaplayer_options_cache) = x;
            
            // Rebuild dropdown: clear and re-add all options
            lv_dropdown_clear_options((lv_obj_t*)id(mediaplayer_dropdown));
            
            std::string opts = x;
            std::string cur_active = id(active_mediaplayer);
            uint16_t sel_idx = 0;
            uint16_t idx = 0;
            std::string token;
            size_t pos = 0;
            
            // Parse comma-separated list
            while (true) {
              pos = opts.find(',');
              token = (pos == std::string::npos) ? opts : opts.substr(0, pos);
              // Trim whitespace
              size_t s = token.find_first_not_of(" 	");
              size_t e = token.find_last_not_of(" 	");
              if (s != std::string::npos) token = token.substr(s, e - s + 1);
              if (!token.empty()) {
                lv_dropdown_add_option((lv_obj_t*)id(mediaplayer_dropdown),
                                       token.c_str(), idx);
                if (token == cur_active) sel_idx = idx;
                idx++;
              }
              if (pos == std::string::npos) break;
              opts = opts.substr(pos + 1);
            }
            // Select the current active player
            lv_dropdown_set_selected((lv_obj_t*)id(mediaplayer_dropdown), sel_idx);
            ESP_LOGI("settings", "Dropdown rebuilt with %d options, selected %d", idx, sel_idx);

  # SD card text sensors — wired from sd_card.yaml IDs
  - platform: template
    id: sd_type_settings
    internal: true
    lambda: |-
      if (id(sd_card_type_sensor).has_state()) return id(sd_card_type_sensor).state;
      return std::string("–");
    update_interval: 30s
    on_value:
      then:
        - lambda: 'lv_label_set_text_fmt(id(lbl_sd_type), "Type: %s", x.c_str());'

sensor:
  - platform: wifi_signal
    id: wifi_signal_settings
    internal: true
    update_interval: 15s
    on_value:
      then:
        - lambda: |-
            // Use snprintf to avoid any lv_label_set_text_fmt float issues
            int pct = (int)std::min(std::max(2.0f * ((float)x + 100.0f), 0.0f), 100.0f);
            char buf[32];
            snprintf(buf, sizeof(buf), "Signal: %ddBm (%d%%)", (int)x, pct);
            lv_label_set_text(id(lbl_wifi_db), buf);

  - platform: debug
    free:
      id: heap_free_settings
      internal: true
      on_value:
        then:
          - lambda: |-
              char buf[24];
              snprintf(buf, sizeof(buf), "Heap: %dB", (int)x);
              lv_label_set_text(id(lbl_heap), buf);

  # SD card sensors from sd_card.yaml — reference by existing IDs
  - platform: template
    id: sd_total_settings
    internal: true
    lambda: |-
      if (id(sd_total_space).has_state()) return id(sd_total_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Total: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_total), buf);

  - platform: template
    id: sd_used_settings
    internal: true
    lambda: |-
      if (id(sd_used_space).has_state()) return id(sd_used_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Used: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_used), buf);

  - platform: template
    id: sd_free_settings
    internal: true
    lambda: |-
      if (id(sd_free_space).has_state()) return id(sd_free_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Free: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_free), buf);

interval:
  - interval: 30s
    then:
      # NTP status — sync state + last sync time
      - lambda: |-
          char buf[48];
          if (id(time_comp).now().is_valid()) {
            auto t = id(time_comp).now();
            snprintf(buf, sizeof(buf), "NTP: synced %02d:%02d", t.hour, t.minute);
          } else {
            snprintf(buf, sizeof(buf), "NTP: not synced");
          }
          lv_label_set_text(id(lbl_ntp_status), buf);

      # NTP server IP — read from ha-config.yaml ntp servers substitution
      # We can't resolve the hostname at runtime easily, so show the configured value


      # Gateway via WIFI component C++ call
      - lambda: |-
          esp_netif_ip_info_t ip_info;
          esp_netif_t *netif = esp_netif_get_handle_from_ifkey("WIFI_STA_DEF");
          char buf[32];
          if (netif && esp_netif_get_ip_info(netif, &ip_info) == ESP_OK) {
            uint32_t gw = ip_info.gw.addr;
            snprintf(buf, sizeof(buf), "GW: %d.%d.%d.%d",
                     (int)(gw & 0xFF), (int)((gw >> 8) & 0xFF),
                     (int)((gw >> 16) & 0xFF), (int)((gw >> 24) & 0xFF));
          } else {
            snprintf(buf, sizeof(buf), "GW: unavailable");
          }
          lv_label_set_text(id(lbl_wifi_gw), buf);

      # Battery voltage + charging with snprintf (avoids %f rendering issues)
      - lambda: |-
          float v = id(battery_voltage).state;
          char buf[24];
          if (!isnan(v)) {
            snprintf(buf, sizeof(buf), "Voltage: %.2fV", v);
          } else {
            snprintf(buf, sizeof(buf), "Voltage: –");
          }
          lv_label_set_text(id(lbl_batt_v), buf);

          snprintf(buf, sizeof(buf), "Level: %d%%", id(batt_percent));
          lv_label_set_text(id(lbl_batt_pct), buf);

          bool chg = (!isnan(v) && v > 4.21f);
          id(is_charging) = chg;
          if (chg) {
            lv_label_set_text(id(lbl_charging), "Charging: YES");
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0x00FF88), 0);
          } else {
            lv_label_set_text(id(lbl_charging), "Charging: NO");
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0xCCCCCC), 0);
          }

      # SD card info — type and filesystem from text sensors, frequency from sensor
      - lambda: |-
          // SD card type from sd_card.yaml text sensor
          if (id(sd_card_type_sensor).has_state()) {
            lv_label_set_text_fmt(id(lbl_sd_type), "Type: %s", id(sd_card_type_sensor).state.c_str());
          }
          // Filesystem type — FAT32 is always used by ESP-IDF sd_mmc
          lv_label_set_text(id(lbl_sd_fs), "FS: FAT32");
          // SD frequency — show from the esphome sd_mmc sensor if available
          // The sd_card.yaml frequency sensor has no ID; show kHz from platform default
          // sd_freq_sensor is in kHz from the sd_mmc platform
          if (id(sd_freq_sensor).has_state()) {
            char fbuf[24];
