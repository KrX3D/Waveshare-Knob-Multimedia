                    - obj:
                        align: TOP_MID
                        y: 410
                        width: 220
                        height: 1
                        bg_color: 0x00BFFF
                        bg_opa: COVER
                        border_width: 0

                    - button:
                        id: antiburn_btn
                        align: TOP_MID
                        y: 418
                        width: 180
                        height: 36
                        bg_color: 0x1a3a1a
                        border_color: 0x00AA44
                        border_width: 1
                        radius: 8
                        on_click:
                          then:
                            - switch.toggle: switch_antiburn
                        widgets:
                          - label:
                              align: CENTER
                              text_font: roboto_small
                              text_color: 0x00FF66
                              text: "Toggle Antiburn"

                    # ════════ SD Card ════════
                    - label:
                        align: TOP_MID
                        y: 468
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "SD Card"

                    - obj:
                        align: TOP_MID
                        y: 490
                        width: 220
                        height: 1
                        bg_color: 0x00BFFF
                        bg_opa: COVER
                        border_width: 0

                    - label:
                        id: lbl_sd_type
                        align: TOP_LEFT
                        y: 496
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Type: –"

                    - label:
                        id: lbl_sd_fs
                        align: TOP_LEFT
                        y: 516
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "FS: –"

                    - label:
                        id: lbl_sd_total
                        align: TOP_LEFT
                        y: 536
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Total: –"

                    - label:
                        id: lbl_sd_used
                        align: TOP_LEFT
                        y: 556
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Used: –"

                    - label:
                        id: lbl_sd_free
                        align: TOP_LEFT
                        y: 576
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Free: –"

                    - label:
                        id: lbl_sd_freq
                        align: TOP_LEFT
                        y: 596
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Freq: –"

                    # ════════ System ════════
                    - label:
                        align: TOP_MID
                        y: 626
                        text_font: roboto_18_bold
                        text_color: 0x00BFFF
                        text: "System"

                    - obj:
                        align: TOP_MID
                        y: 648
                        width: 220
                        height: 1
                        bg_color: 0x00BFFF
                        bg_opa: COVER
                        border_width: 0

                    - label:
                        id: lbl_heap
                        align: TOP_LEFT
                        y: 654
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "Heap: –"

                    - label:
                        id: lbl_esphome_ver
                        align: TOP_LEFT
                        y: 674
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        long_mode: DOT
                        width: 240
                        text: "ESPHome: –"

                    - label:
                        id: lbl_ntp_status
                        align: TOP_LEFT
                        y: 694
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "NTP: –"

                    - label:
                        id: lbl_ntp_ip
                        align: TOP_LEFT
                        y: 714
                        text_font: roboto_small
                        text_color: 0xCCCCCC
                        text: "NTP IP: –"

# ── Sensors populating settings labels ─────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ssid), "SSID: %s", x.c_str());
    ip_address:
      id: wifi_ip_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ip), "IP: %s", x.c_str());
    dns_address:
      id: wifi_dns_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_dns), "DNS: %s", x.c_str());

  - platform: version
    id: esphome_version_sensor
    internal: true
    on_value:
      then:
        # Only show version number, not the long config hash
        - lambda: |-
            std::string ver = x;
            auto pos = ver.find(" (");   // trim everything from " (config hash..." onward
            if (pos != std::string::npos) ver = ver.substr(0, pos);
            lv_label_set_text_fmt(id(lbl_esphome_ver), "ESPHome: %s", ver.c_str());

  # SD card text sensors — wired from sd_card.yaml IDs
  - platform: template
    id: sd_type_settings
    internal: true
    lambda: |-
      if (id(sd_card_type_sensor).has_state()) return id(sd_card_type_sensor).state;
      return std::string("–");
    update_interval: 30s
    on_value:
      then:
        - lambda: 'lv_label_set_text_fmt(id(lbl_sd_type), "Type: %s", x.c_str());'

sensor:
  - platform: wifi_signal
    id: wifi_signal_settings
    internal: true
    update_interval: 15s
    on_value:
      then:
        - lambda: |-
            // Use snprintf to avoid any lv_label_set_text_fmt float issues
            int pct = (int)std::min(std::max(2.0f * ((float)x + 100.0f), 0.0f), 100.0f);
            char buf[32];
            snprintf(buf, sizeof(buf), "Signal: %ddBm (%d%%)", (int)x, pct);
            lv_label_set_text(id(lbl_wifi_db), buf);

  - platform: debug
    free:
      id: heap_free_settings
      internal: true
      on_value:
        then:
          - lambda: |-
              char buf[24];
              snprintf(buf, sizeof(buf), "Heap: %dB", (int)x);
              lv_label_set_text(id(lbl_heap), buf);

  # SD card sensors from sd_card.yaml — reference by existing IDs
  - platform: template
    id: sd_total_settings
    internal: true
    lambda: |-
      if (id(sd_total_space).has_state()) return id(sd_total_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Total: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_total), buf);

  - platform: template
    id: sd_used_settings
    internal: true
    lambda: |-
      if (id(sd_used_space).has_state()) return id(sd_used_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Used: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_used), buf);

  - platform: template
    id: sd_free_settings
    internal: true
    lambda: |-
      if (id(sd_free_space).has_state()) return id(sd_free_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Free: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_free), buf);

interval:
  - interval: 30s
    then:
      # NTP status — show sync state + last synced time + server IP
      - lambda: |-
          char buf[48];
          if (id(time_comp).now().is_valid()) {
            auto t = id(time_comp).now();
            snprintf(buf, sizeof(buf), "NTP: OK (synced %02d:%02d)", t.hour, t.minute);
          } else {
            snprintf(buf, sizeof(buf), "NTP: not synced");
          }
          lv_label_set_text(id(lbl_ntp_status), buf);

      # Gateway via WIFI component C++ call
      - lambda: |-
          auto ip = WiFi.gatewayIP();
          char buf[32];
          snprintf(buf, sizeof(buf), "GW: %d.%d.%d.%d",
                   ip[0], ip[1], ip[2], ip[3]);
          lv_label_set_text(id(lbl_wifi_gw), buf);

      # Battery voltage + charging with snprintf (avoids %f rendering issues)
      - lambda: |-
          float v = id(battery_voltage).state;
          char buf[24];
          if (!isnan(v)) {
            snprintf(buf, sizeof(buf), "Voltage: %.2fV", v);
          } else {
            snprintf(buf, sizeof(buf), "Voltage: –");
          }
          lv_label_set_text(id(lbl_batt_v), buf);

          snprintf(buf, sizeof(buf), "Level: %d%%", id(batt_percent));
          lv_label_set_text(id(lbl_batt_pct), buf);

          bool chg = (!isnan(v) && v > 4.21f);
          id(is_charging) = chg;
          if (chg) {
            lv_label_set_text(id(lbl_charging), "Charging: YES +");
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0x00FF88), 0);
          } else {
            lv_label_set_text(id(lbl_charging), "Charging: NO");
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0xCCCCCC), 0);
          }

      # SD card frequency from existing sensor
      - lambda: |-
          if (id(sd_total_space).has_state()) {
            // sd_mmc frequency sensor doesn't have a direct ID — show placeholder
            lv_label_set_text(id(lbl_sd_freq), "Freq: see HA");
            lv_label_set_text(id(lbl_sd_fs),   "FS: FAT32");
          }