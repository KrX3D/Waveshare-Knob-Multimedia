# Generated by esphome-code-assistant v1.0.0
# settings.yaml — settings page, open by holding screen 2s

globals:
  - id: is_charging
    type: bool
    initial_value: 'false'

  # Runtime-switchable media player entity ID
  # restore_value: true so the last selection survives reboots
  - id: active_mediaplayer
    type: std::string
    restore_value: true
    initial_value: '"${mediaplayer}"'

  # Cached options string from HA input_select — used to rebuild dropdown
  - id: mediaplayer_options_cache
    type: std::string
    restore_value: false
    initial_value: '""'

  # Guard: true while we are programmatically setting the dropdown selection
  - id: dropdown_updating
    type: bool
    initial_value: 'false'

  # Persistent storage for the built dropdown options string.
  # lv_dropdown_set_options_static stores the raw pointer — must outlive the call.
  - id: mediaplayer_dd_str
    type: std::string
    restore_value: false
    initial_value: '""'

lvgl:
  pages:
    - id: settings_page
      on_load:
        then:
          - lambda: 'id(active_page_id) = 2;'
          # Immediate: scroll flags + UI sync (no widget rebuilds)
          - lambda: |-
              lv_obj_clear_flag(id(settings_scroll), LV_OBJ_FLAG_SCROLL_ELASTIC);
              lv_obj_clear_flag(id(settings_scroll), LV_OBJ_FLAG_SCROLL_MOMENTUM);
              lv_obj_scroll_to_y(id(settings_scroll), 0, LV_ANIM_OFF);
              lv_label_set_text_fmt(id(lbl_mediaplayer_current),
                                    "Active: %s", id(active_mediaplayer).c_str());
              int timeout_cur = (int)id(display_timeout).state;
              lv_slider_set_value(id(timeout_slider), timeout_cur, LV_ANIM_OFF);
              char buf[24];
              snprintf(buf, sizeof(buf), "Timeout: %ds", timeout_cur);
              lv_label_set_text(id(lbl_timeout_val), buf);
              lv_label_set_text(id(lbl_haptic_val), "Strength: 127");
          # Rebuild dropdown after page animation completes
          - script.execute: rebuild_mediaplayer_dropdown
      widgets:

