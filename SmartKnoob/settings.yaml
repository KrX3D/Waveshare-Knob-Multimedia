                            - script.execute: refresh_media_data

# ── Sensors populating settings labels ─────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              lv_label_set_text_fmt(id(lbl_wifi_ssid), "SSID: %s", x.c_str());
    ip_address:
      id: wifi_ip_sensor
      internal: true
      on_value:
        then:
          - lambda: |-
              if (!x.empty() && x != "0.0.0.0")
                lv_label_set_text_fmt(id(lbl_wifi_ip), "IP: %s", x.c_str());
    dns_address:
      id: wifi_dns_sensor
      internal: true
      on_value:
        then:
          # Guard against 0.0.0.0 which fires before DHCP completes
          - lambda: |-
              // wifi_info fires once per DNS entry; only update on first non-zero value
              static bool dns_set = false;
              if (!dns_set && !x.empty() && x != "0.0.0.0") {
                lv_label_set_text_fmt(id(lbl_wifi_dns), "DNS: %s", x.c_str());
                dns_set = true;
              }

  - platform: version
    id: esphome_version_sensor
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string ver = x;
            auto pos = ver.find(" (");
            if (pos != std::string::npos) ver = ver.substr(0, pos);
            lv_label_set_text_fmt(id(lbl_esphome_ver), "ESPHome: %s", ver.c_str());

  # Sync current selection from HA input_select state
  - platform: homeassistant
    id: mediaplayer_select_state
    entity_id: input_select.media_player_thumbnail_source
    internal: true
    on_value:
      then:
        - lambda: |-
            // Only update active_mediaplayer from HA if it's a real entity, not "None"
            // "None" in input_select means nothing is selected in HA — keep our local value
            if (!x.empty() && x != "None") {
              id(active_mediaplayer) = x;
              ESP_LOGI("settings", "Active player synced from HA: %s", x.c_str());
            } else {
              ESP_LOGI("settings", "HA reports None — keeping local active: %s",
                       id(active_mediaplayer).c_str());
            }
            if (id(active_page_id) == 2) {
              lv_label_set_text_fmt(id(lbl_mediaplayer_current),
                                    "Active: %s", id(active_mediaplayer).c_str());
            }

  # Get options list from HA input_select and rebuild dropdown dynamically
  - platform: homeassistant
    id: mediaplayer_options_sensor
    entity_id: input_select.media_player_thumbnail_source
    attribute: options
    internal: true
    on_value:
      then:
        - lambda: |-
            // Just store — dropdown is rebuilt from cache when settings page opens
            if (!x.empty()) {
              id(mediaplayer_options_cache) = x;
              ESP_LOGI("settings", "Options cached (%d bytes)", (int)x.size());
            }

  # SD card text sensors — wired from sd_card.yaml IDs
  - platform: template
    id: sd_type_settings
    internal: true
    lambda: |-
      if (id(sd_card_type_sensor).has_state()) return id(sd_card_type_sensor).state;
      return std::string("–");
    update_interval: 30s
    on_value:
      then:
        - lambda: 'lv_label_set_text_fmt(id(lbl_sd_type), "Type: %s", x.c_str());'

sensor:
  - platform: wifi_signal
    id: wifi_signal_settings
    internal: true
    update_interval: 15s
    on_value:
      then:
        - lambda: |-
            // Use snprintf to avoid any lv_label_set_text_fmt float issues
            int pct = (int)std::min(std::max(2.0f * ((float)x + 100.0f), 0.0f), 100.0f);
            char buf[32];
            snprintf(buf, sizeof(buf), "Signal: %ddBm (%d%%)", (int)x, pct);
            lv_label_set_text(id(lbl_wifi_db), buf);

  - platform: debug
    free:
      id: heap_free_settings
      internal: true
      on_value:
        then:
          - lambda: |-
              char buf[24];
              snprintf(buf, sizeof(buf), "Heap: %dB", (int)x);
              lv_label_set_text(id(lbl_heap), buf);

  # SD card sensors from sd_card.yaml — reference by existing IDs
  - platform: template
    id: sd_total_settings
    internal: true
    lambda: |-
      if (id(sd_total_space).has_state()) return id(sd_total_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Total: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_total), buf);

  - platform: template
    id: sd_used_settings
    internal: true
    lambda: |-
      if (id(sd_used_space).has_state()) return id(sd_used_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Used: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_used), buf);

  - platform: template
    id: sd_free_settings
    internal: true
    lambda: |-
      if (id(sd_free_space).has_state()) return id(sd_free_space).state;
      return 0.0;
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Free: %.1f MB", x);
            lv_label_set_text(id(lbl_sd_free), buf);

script:
  - id: rebuild_mediaplayer_dropdown
    mode: single
    then:
      - delay: 500ms
      - lambda: |-
          ESP_LOGI("settings", "rebuild start, page=%d", id(active_page_id));
          if (id(active_page_id) != 2) {
            ESP_LOGW("settings", "rebuild: not on settings page, abort");
            return;
          }
          std::string cur = id(active_mediaplayer);
          std::string raw = id(mediaplayer_options_cache);
          ESP_LOGI("settings", "rebuild: active='%s' cache=%d bytes",
                   cur.c_str(), (int)raw.size());
          if (raw.empty()) { ESP_LOGW("settings", "Cache empty"); return; }
          // Strip Python list brackets: ['a','b'] -> a,b
          std::string opts = raw;
          if (!opts.empty() && opts[0] == '[')
            opts = opts.substr(1, opts.size() > 2 ? opts.size() - 2 : 0);
          // Strip single-quotes (ASCII 39)
          std::string cleaned;
          for (char c : opts) { if (c != 39) cleaned += c; }
          ESP_LOGI("settings", "cleaned: '%s'", cleaned.c_str());
          // Build \n-separated list of media_player.* only
          std::string dd;
          uint16_t sel = 0, idx = 0;
          size_t p = 0;
          while (true) {
            size_t cm = cleaned.find(',', p);
            std::string t = cleaned.substr(p,
              cm == std::string::npos ? std::string::npos : cm - p);
            while (!t.empty() && t.front() == ' ') t.erase(0, 1);
            while (!t.empty() && t.back()  == ' ') t.pop_back();
            if (t.size() > 12 && t.substr(0, 13) == "media_player.") {
              if (!dd.empty()) dd += '\n';
              dd += t;
              ESP_LOGI("settings", "  opt[%d]='%s'%s", idx, t.c_str(),
                       t == cur ? " ACTIVE" : "");
              if (t == cur) sel = idx;
              idx++;
            }
            if (cm == std::string::npos) break;
            p = cm + 1;
          }
          if (idx == 0) { ESP_LOGW("settings", "No valid options found"); return; }
          ESP_LOGI("settings", "Setting %d options on dropdown", idx);
          // Store in global so pointer stays valid after lambda returns.
          // Use set_options_static — avoids lv_mem_free of the flash-backed
          // initial pointer that ESPHome set at init time (crashes heap_caps_free).
          id(mediaplayer_dd_str) = dd;
          id(dropdown_updating) = true;
          lv_dropdown_set_options_static((lv_obj_t*)id(mediaplayer_dropdown),
                                          id(mediaplayer_dd_str).c_str());
          lv_dropdown_set_selected((lv_obj_t*)id(mediaplayer_dropdown), sel);
          // lv_obj_get_disp returns null inside scrollable containers in ESPHome pages,
          // so lv_dropdown_set_selected can't repaint the button label automatically.
          // Manually get the button's label child (child 0) and set its text directly.
          lv_obj_t* dd_btn = (lv_obj_t*)id(mediaplayer_dropdown);
          lv_obj_t* dd_label = lv_obj_get_child(dd_btn, 0);
          if (dd_label != nullptr) {
            lv_label_set_text(dd_label, cur.c_str());
            ESP_LOGI("settings", "Button label set to '%s'", cur.c_str());
          } else {
            ESP_LOGW("settings", "Could not find dropdown button label child");
          }
          id(dropdown_updating) = false;
          ESP_LOGI("settings", "Dropdown rebuilt: %d opts, sel=%d", idx, sel);


interval:
  - interval: 30s
    then:
      # NTP status — sync state + last sync time
      - lambda: |-
          char buf[48];
          if (id(time_comp).now().is_valid()) {
            auto t = id(time_comp).now();
            snprintf(buf, sizeof(buf), "NTP: synced %02d:%02d", t.hour, t.minute);
          } else {
            snprintf(buf, sizeof(buf), "NTP: not synced");
          }
          lv_label_set_text(id(lbl_ntp_status), buf);

      # NTP server IP — read from ha-config.yaml ntp servers substitution
      # We can't resolve the hostname at runtime easily, so show the configured value


      # Gateway via WIFI component C++ call
      - lambda: |-
          esp_netif_ip_info_t ip_info;
          esp_netif_t *netif = esp_netif_get_handle_from_ifkey("WIFI_STA_DEF");
          char buf[32];
          if (netif && esp_netif_get_ip_info(netif, &ip_info) == ESP_OK) {
            uint32_t gw = ip_info.gw.addr;
            snprintf(buf, sizeof(buf), "GW: %d.%d.%d.%d",
                     (int)(gw & 0xFF), (int)((gw >> 8) & 0xFF),
                     (int)((gw >> 16) & 0xFF), (int)((gw >> 24) & 0xFF));
          } else {
            snprintf(buf, sizeof(buf), "GW: unavailable");
          }
          lv_label_set_text(id(lbl_wifi_gw), buf);

      # Battery voltage + charging with snprintf (avoids %f rendering issues)
      - lambda: |-
          float v = id(battery_voltage).state;
          char buf[24];
          if (!isnan(v)) {
            snprintf(buf, sizeof(buf), "Voltage: %.2fV", v);
          } else {
            snprintf(buf, sizeof(buf), "Voltage: –");
          }
          lv_label_set_text(id(lbl_batt_v), buf);

          snprintf(buf, sizeof(buf), "Level: %d%%", id(batt_percent));
          lv_label_set_text(id(lbl_batt_pct), buf);

          bool chg = (!isnan(v) && v > 4.21f);
          id(is_charging) = chg;
          if (chg) {
            lv_label_set_text(id(lbl_charging), "Charging: YES");
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0x00FF88), 0);
          } else {
            lv_label_set_text(id(lbl_charging), "Charging: NO");
            lv_obj_set_style_text_color(id(lbl_charging), lv_color_hex(0xCCCCCC), 0);
          }

      # SD card info — type and filesystem from text sensors, frequency from sensor
      - lambda: |-
          // SD card type from sd_card.yaml text sensor
          if (id(sd_card_type_sensor).has_state()) {
            lv_label_set_text_fmt(id(lbl_sd_type), "Type: %s", id(sd_card_type_sensor).state.c_str());
          }
          // Filesystem type — FAT32 is always used by ESP-IDF sd_mmc
          lv_label_set_text(id(lbl_sd_fs), "FS: FAT32");
          // SD frequency — show from the esphome sd_mmc sensor if available
          // The sd_card.yaml frequency sensor has no ID; show kHz from platform default
          // sd_freq_sensor is in kHz from the sd_mmc platform
          if (id(sd_freq_sensor).has_state()) {
            char fbuf[24];
            snprintf(fbuf, sizeof(fbuf), "Freq: %.0f kHz", id(sd_freq_sensor).state);
            lv_label_set_text(id(lbl_sd_freq), fbuf);
          }