# Generated by esphome-code-assistant v1.0.0
# waveshare.yaml — added long-press (2s) to open settings page

esphome:
  on_boot:
    - priority: -100
      then:
        - delay: 2s
        - script.execute: screentime

display:
  - platform: mipi_spi
    id: main_display
    model: JC3636W518V2
    data_rate: 80MHz
    color_order: rgb
    rotation: 0
    cs_pin: 14
    reset_pin: 21
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never
    dimensions:
      height: 360
      width: 360

binary_sensor:
  - platform: template
    name: "Touch Button"
    id: touch_input

touchscreen:
  - platform: cst816
    id: my_touchscreen
    display: main_display
    interrupt_pin: GPIO9
    reset_pin: GPIO10
    transform:
      mirror_x: false
      mirror_y: false
      swap_xy: false
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: ON
        - script.execute: screentime
        # Start long-press timer — fires settings page after 2s if not released
        - script.execute: long_press_settings
    on_release:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: OFF
        # Cancel settings timer if finger lifted before 2s
        - script.stop: long_press_settings
        - if:
            condition: lvgl.is_paused
            then:
              - logger.log: "LVGL resuming"
              - lvgl.resume:
              - lvgl.widget.redraw:
              - light.turn_on: back_light

spi:
  id: display_qspi
  type: quad
  clk_pin: 13
  data_pins: [15, 16, 17, 18]

i2c:
  sda: 11
  scl: 12
  id: ic_bus

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    icon: "mdi:television"
    entity_category: config
    id: back_light
    restore_mode: ALWAYS_ON
    default_transition_length:
      milliseconds: 30
    initial_state:
      brightness: 50%
    on_turn_off:
      then:
        - lvgl.pause:
            show_snow: true
    on_turn_on:
      then:
        - lvgl.resume:

script:
  - id: screentime
    mode: restart
    then:
      - light.turn_on: back_light
      - delay: $screensaver
      - light.turn_off: back_light

  - id: screenoff
    then:
      - script.stop: screentime
      - light.turn_off: back_light

  # Long press: hold 2 seconds anywhere on screen to open settings
  - id: long_press_settings
    mode: single
    then:
      - delay: 2s
      - haptic_feedback: {}   # optional — remove if drv2605 isn't available here
      - lvgl.page.show: settings_page