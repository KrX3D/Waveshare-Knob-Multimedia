# Generated by esphome-code-assistant v1.0.0
# adc_battery.yaml — faster update + charging detection + grey low battery (no red)

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    update_interval: 5s
    unit_of_measurement: "V"
    icon: mdi:battery-medium
    accuracy_decimals: 2
    filters:
      - multiply: 2.0
      - median:
          # window_size 3: collects 3 readings, picks the median.
          # At 5s update_interval this means first reading after ~15s (3×5s),
          # but send_first_at: 1 emits immediately after the very first sample.
          # Smaller than the original window_size 7 (which took 7s×7=49s to emit)
          # so charging/discharging is detected ~3x faster. Still filters outliers.
          window_size: 3
          send_every: 3
          send_first_at: 1
      - throttle: 30s
    on_value:
      then:
        - component.update: battery_percentage
        # Update settings page voltage label with snprintf (avoids LVGL %f quirks)
        - lambda: |-
            if (lv_obj_is_valid((lv_obj_t*)id(lbl_batt_v))) {
              char buf[24];
              snprintf(buf, sizeof(buf), "Voltage: %.2fV", x);
              lv_label_set_text(id(lbl_batt_v), buf);
            }
            bool chg = (x > 4.21f && !isnan(x));
            id(is_charging) = chg;
            if (lv_obj_is_valid((lv_obj_t*)id(lbl_charging))) {
              // Keep YES/NO consistent — + only in settings, not on main pages
              lv_label_set_text(id(lbl_charging), chg ? "Charging: YES" : "Charging: NO");
              lv_obj_set_style_text_color(id(lbl_charging),
                chg ? lv_color_hex(0x00FF88) : lv_color_hex(0xCCCCCC), 0);
            }

  - platform: template
    id: battery_percentage
    name: "Battery Percentage"
    lambda: |-
      float v = id(battery_voltage).state;
      if (std::isnan(v) || std::isinf(v)) return 0.0;
      if (v < 2.5) return 0.0;
      if (v > 4.5) return 4.5;
      return v;
    accuracy_decimals: 0
    unit_of_measurement: "%"
    icon: mdi:battery-medium
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 3.00 -> 0.0
            - 3.30 -> 5.0
            - 3.50 -> 10.0
            - 3.60 -> 20.0
            - 3.65 -> 30.0
            - 3.70 -> 40.0
            - 3.75 -> 50.0
            - 3.80 -> 60.0
            - 3.90 -> 70.0
            - 4.00 -> 80.0
            - 4.10 -> 90.0
            - 4.15 -> 95.0
            - 4.20 -> 100.0
      - lambda: |-
          if (x > 100) return 100;
          if (x < 0) return 0;
          return x;
    on_value:
      then:
        - lambda: |-
            if (std::isnan(x) || std::isinf(x)) { id(batt_percent) = 0; return; }
            int pct = (int)round(x);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            id(batt_percent) = pct;

            // Settings page level label
            if (lv_obj_is_valid((lv_obj_t*)id(lbl_batt_pct))) {
              char buf[16];
              snprintf(buf, sizeof(buf), "Level: %d%%", pct);
              lv_label_set_text(id(lbl_batt_pct), buf);
            }

        # Arc: filled = green >50%, orange >20%, GREY <=20% (no red per request)
        - lvgl.arc.update:
            id: batt_arc
            value: !lambda 'return id(batt_percent);'
            arc_color: !lambda |-
              int pct = id(batt_percent);
              if (pct > 50)       return lv_color_hex(0x00CC44);  // green
              else if (pct > 20)  return lv_color_hex(0xFFA500);  // orange
              else                return lv_color_hex(0x888888);  // grey (low)

        # Battery text — no + sign, just percentage
        # Uses roboto_small so it fits inside the arc even at 100%
        - lvgl.label.update:
            id: batt_text
            text: !lambda |-
              char buf[8];
              snprintf(buf, sizeof(buf), "%d%%", id(batt_percent));
              return std::string(buf);