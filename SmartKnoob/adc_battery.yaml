# Generated by esphome-code-assistant v1.0.0
# adc_battery.yaml — faster update + settings page integration + charging detection

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    update_interval: 5s        # was 1s with 7-sample median = 7s lag; now 5s raw
    unit_of_measurement: "V"
    icon: mdi:battery-medium
    accuracy_decimals: 2
    filters:
      - multiply: 2.0
      - median:
          window_size: 3       # reduced from 7 — faster detection, still smoothed
          send_every: 3
          send_first_at: 1
      - throttle: 30s          # update HA every 30s (was 1min)
    on_value:
      then:
        - component.update: battery_percentage
        # Update settings page voltage label
        - lambda: |-
            if (lv_obj_is_valid((lv_obj_t*)id(lbl_batt_v))) {
              lv_label_set_text_fmt(id(lbl_batt_v), "Voltage: %.2fV", x);
            }
            // Charging detection: USB connected pushes voltage above 4.21V
            bool charging = x > 4.21f;
            id(is_charging) = charging;
            if (lv_obj_is_valid((lv_obj_t*)id(lbl_charging))) {
              lv_label_set_text(id(lbl_charging), charging ? "Charging: YES" : "Charging: NO");
            }

  - platform: template
    id: battery_percentage
    name: "Battery Percentage"
    lambda: |-
      float v = id(battery_voltage).state;
      if (std::isnan(v) || std::isinf(v)) return 0.0;
      if (v < 2.5) return 0.0;
      if (v > 4.5) return 4.5;
      return v;
    accuracy_decimals: 0
    unit_of_measurement: "%"
    icon: mdi:battery-medium
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 3.00 -> 0.0
            - 3.30 -> 5.0
            - 3.50 -> 10.0
            - 3.60 -> 20.0
            - 3.65 -> 30.0
            - 3.70 -> 40.0
            - 3.75 -> 50.0
            - 3.80 -> 60.0
            - 3.90 -> 70.0
            - 4.00 -> 80.0
            - 4.10 -> 90.0
            - 4.15 -> 95.0
            - 4.20 -> 100.0
      - lambda: |-
          if (x > 100) return 100;
          if (x < 0) return 0;
          return x;
    on_value:
      then:
        - lambda: |-
            if (std::isnan(x) || std::isinf(x)) { id(batt_percent) = 0; return; }
            int pct = (int)round(x);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            id(batt_percent) = pct;

            // Update settings page percentage label
            if (lv_obj_is_valid((lv_obj_t*)id(lbl_batt_pct))) {
              lv_label_set_text_fmt(id(lbl_batt_pct), "Level: %d%%", pct);
            }

        # Update arc color by percentage
        - lvgl.arc.update:
            id: batt_arc
            value: !lambda 'return id(batt_percent);'
            arc_color: !lambda |-
              int pct = id(batt_percent);
              if (pct > 50) return lv_color_hex(0x00FF00);
              else if (pct > 20) return lv_color_hex(0xFFA500);
              else return lv_color_hex(0xFF0000);

        # Update battery text on time page
        - lvgl.label.update:
            id: batt_text
            text: !lambda |-
              char buf[16];
              bool charging = id(is_charging);
              snprintf(buf, sizeof(buf), charging ? "%d%% +" : "%d%%", id(batt_percent));
              return std::string(buf);