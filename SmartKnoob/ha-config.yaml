logger:
  level: $log_level
  #baud_rate: 0
  
# Enable Home Assistant API
api:
  encryption:
    key: $api_key

ota:
  - platform: esphome
    password: $ota_password
    
wifi:
  id: iptime
  ssid: !secret wifi_ssid_iot
  password: !secret wifi_password_iot
  #power_save_mode: HIGH
  fast_connect: true
  manual_ip: 
    static_ip: $wifi_static_ip
    gateway: !secret iot_gateway
    subnet: $wifi_subnet
    dns1: !secret dns_server

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: !secret wifi_ap_password
    
time:
  - platform: sntp
    id: time_comp
    timezone: $timezone
    servers:
    - !secret ntp_server      # local NTP server
    - !secret ntp_server2      # local NTP server
    - 0.de.pool.ntp.org # fallback public
    on_time:
      - cron: '* * * * * *'
        then:
          - script.execute: update_time_labels
          
debug:
  update_interval: 5s
  
text_sensor:
  - platform: version
    name: "Esphome Version"

  - platform: wifi_info
    ip_address:
     name: ESP IP Address
     
binary_sensor:
  - platform: status
    name: "Connection Status"
    
button:
  - platform: restart
    name: "Restart"
    id: re_start
    entity_category: diagnostic
    
sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    internal: true
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "% Signal"
    entity_category: "diagnostic"
    device_class: ""
    icon: mdi:wifi
    
  # Free memory info
  - platform: debug
    free:
      name: "Heap Free"